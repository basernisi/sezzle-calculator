services:
  backend:
    build:
      context: ./backend
    environment:
      SERVER_ADDRESS: :18080
      FRONTEND_ORIGIN: http://localhost:15173
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      DEMO_CLIENT_ID: ${DEMO_CLIENT_ID:-sezzle-demo-client}
      DEMO_CLIENT_SECRET: ${DEMO_CLIENT_SECRET:-replace-with-a-demo-client-secret}
    ports:
      - "18080:18080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:18080
    depends_on:
      - backend
    ports:
      - "15173:80"
